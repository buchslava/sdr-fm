<main class="winamp-panel">
  <div class="station-list" [class.frozen]="isPlaying">
    <div class="station-list-header">
      <span class="col-freq">Freq</span>
      <span class="col-name">Name</span>
    </div>
    <div class="station-list-body">
      @for (station of stations; track station.frequencyKhz) {
        <button
          type="button"
          class="station-row"
          [class.selected]="frequencyKhz === station.frequencyKhz"
          [disabled]="isPlaying"
          (click)="selectStation(station.frequencyKhz)"
        >
          <span class="col-freq">{{ formatMhz(station.frequencyKhz) }}</span>
          <span class="col-name"></span>
        </button>
      }
    </div>
  </div>

  <div class="transport">
    <button type="button" class="transport-btn" (click)="listen()" [disabled]="isPlaying">
      Start
    </button>
    <button type="button" class="transport-btn" (click)="stop()" [disabled]="!isPlaying">
      Stop
    </button>
  </div>

  <p class="status-bar" [class.error]="!!error">{{ statusLine }}</p>
</main>
