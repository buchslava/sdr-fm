<main class="container">
  <header class="header">
    <h1>SDR FM</h1>
    <p class="subtitle">RTL-SDR wideband FM receiver</p>
  </header>

  <section class="tuner">
    <label class="field-label" for="frequency-input">Frequency (kHz)</label>
    <div class="frequency-row">
      <input
        id="frequency-input"
        type="number"
        min="64000"
        max="1080000"
        step="50"
        [(ngModel)]="frequencyKhz"
        [disabled]="isPlaying"
        placeholder="101500"
      />
      <span class="mhz">{{ frequencyKhz / 1000 | number: "1.3-3" }} MHz</span>
    </div>
    <p class="hint">FM broadcast band: 64,000 – 1,080,000 kHz (64 – 108 MHz)</p>
  </section>

  <div class="actions">
    <button type="button" class="primary" (click)="listen()" [disabled]="isPlaying">
      Listen
    </button>
    <button type="button" (click)="stop()" [disabled]="!isPlaying">Stop</button>
  </div>

  <p class="status" [class.playing]="isPlaying">{{ status }}</p>
  @if (error) {
    <p class="error">{{ error }}</p>
  }
</main>
